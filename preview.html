<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Icarus Atend — Standalone Preview</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        min-height: 100%;
        background: #f3f7fb;
      }

      #ia-preview-root {
        all: initial;
        display: block;
        width: 100%;
        min-height: 100vh;
        background: #f3f7fb;
        color: #0f172a;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial,
          sans-serif;
        line-height: 1.35;
        letter-spacing: normal;
        text-transform: none;
      }

      #ia-preview-root,
      #ia-preview-root *,
      #ia-preview-root *::before,
      #ia-preview-root *::after {
        box-sizing: border-box;
      }

      #ia-preview-root .ia-app-layout {
        display: flex;
        width: 100%;
        min-height: 100vh;
        max-width: none !important;
      }

      #ia-preview-root .ia-sidebar {
        width: 260px;
        min-width: 260px;
        max-width: 260px;
        background: linear-gradient(180deg, #1f3c88, #14295e);
        color: #f8fafc;
        padding: 1.5rem 1rem;
      }

      #ia-preview-root .ia-logo {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 2rem;
      }

      #ia-preview-root .ia-logo-icon {
        width: 38px;
        height: 38px;
        border-radius: 8px;
        background: linear-gradient(130deg, #0ea5c6, #67e8f9);
        box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.35);
      }

      #ia-preview-root .ia-logo-label {
        font-size: 2rem;
        font-weight: 700;
        color: #fff;
        line-height: 1;
      }

      #ia-preview-root .ia-nav {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      #ia-preview-root .ia-nav-item {
        border: 0;
        background: transparent;
        color: #dbeafe;
        text-align: left;
        padding: 0.65rem 0.75rem;
        border-radius: 8px;
        cursor: default;
        font-size: 0.95rem;
        white-space: nowrap;
      }

      #ia-preview-root .ia-nav-item.is-active {
        background: rgba(255, 255, 255, 0.14);
        color: #fff;
      }

      #ia-preview-root .ia-main {
        flex: 1;
        min-width: 0;
        max-width: none !important;
        display: flex;
        flex-direction: column;
      }

      #ia-preview-root .ia-topbar {
        height: 72px;
        background: #fff;
        border-bottom: 1px solid #d9e2ec;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 2rem;
      }

      #ia-preview-root .ia-topbar-title {
        font-size: 1.05rem;
        font-weight: 700;
        margin: 0;
      }

      #ia-preview-root .ia-topbar-subtitle {
        margin: 0.2rem 0 0;
        color: #475569;
        font-size: 0.88rem;
      }

      #ia-preview-root .ia-topbar-right {
        display: flex;
        align-items: center;
        gap: 0.6rem;
      }

      #ia-preview-root .ia-content {
        width: 100%;
        max-width: none !important;
        padding: 2rem;
        display: grid;
        gap: 1.5rem;
      }

      #ia-preview-root .ia-grid {
        display: grid;
        gap: 1rem;
        width: 100%;
      }

      #ia-preview-root .ia-grid.cols-3 {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      #ia-preview-root .ia-grid.cols-2 {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      #ia-preview-root .ia-card {
        background: #fff;
        border: 1px solid #d9e2ec;
        border-radius: 12px;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
      }

      #ia-preview-root .ia-card-body {
        padding: 1.5rem;
      }

      #ia-preview-root .ia-section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 1rem;
      }

      #ia-preview-root .ia-section-title {
        margin: 0;
        font-size: 1.1rem;
        font-weight: 700;
      }

      #ia-preview-root .ia-section-subtitle {
        margin: 0.25rem 0 0;
        color: #475569;
        font-size: 0.9rem;
      }

      #ia-preview-root .ia-stat-label {
        margin: 0 0 0.35rem;
        color: #475569;
        font-size: 0.8rem;
      }

      #ia-preview-root .ia-stat-value {
        margin: 0;
        font-size: 1.5rem;
        font-weight: 700;
      }

      #ia-preview-root .ia-text-muted {
        margin: 0.45rem 0 0;
        color: #475569;
      }

      #ia-preview-root .ia-list {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 0.75rem;
      }

      #ia-preview-root .ia-list-item {
        border: 1px solid #d9e2ec;
        border-radius: 8px;
        padding: 0.75rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
      }

      #ia-preview-root .ia-ticket-title {
        margin: 0;
        font-weight: 700;
      }

      #ia-preview-root .ia-ticket-subtitle {
        margin: 0.25rem 0 0;
        color: #475569;
      }

      #ia-preview-root .ia-badge {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 0.2rem 0.55rem;
        font-size: 0.75rem;
        font-weight: 600;
        white-space: nowrap;
      }

      #ia-preview-root .ia-badge.info {
        background: #e0f2fe;
        color: #075985;
      }

      #ia-preview-root .ia-badge.success {
        background: #dcfce7;
        color: #166534;
      }

      #ia-preview-root .ia-badge.warning {
        background: #fef3c7;
        color: #92400e;
      }

      #ia-preview-root .ia-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: linear-gradient(130deg, #0ea5c6, #1d4ed8);
        color: #fff;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
      }

      #ia-preview-root .ia-empty {
        border: 1px dashed #cbd5e1;
        border-radius: 12px;
        padding: 1.5rem;
        text-align: left;
      }

      #ia-preview-root .ia-empty-title {
        margin: 0;
        font-size: 1.05rem;
      }

      #ia-preview-root .ia-empty-description {
        margin: 0.5rem 0 0;
        color: #475569;
      }

      @media (max-width: 1080px) {
        #ia-preview-root .ia-app-layout {
          flex-direction: column;
        }

        #ia-preview-root .ia-sidebar {
          width: 100%;
          max-width: none;
          min-width: 0;
        }

        #ia-preview-root .ia-grid.cols-3,
        #ia-preview-root .ia-grid.cols-2 {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="ia-preview-root"></div>

    <script type="module">
      const navItems = [
        'Dashboard',
        'Fila',
        'Meus Atendimentos',
        'Supervisão',
        'Clientes',
        'Administração',
        'Logs',
        'Configurações'
      ];

      const metrics = [
        { label: 'Atendimentos em aberto', value: '42', footer: '+8 nas últimas 2h' },
        { label: 'Em fila', value: '17', footer: '4 com prioridade alta' },
        { label: 'Tempo médio (TMA)', value: '06m14s', footer: '-12% vs. ontem' }
      ];

      const recentTickets = [
        { id: 'ATD-1298', customer: 'Camila Torres', channel: 'Chat', status: 'Em andamento' },
        { id: 'ATD-1297', customer: 'Rafael Moraes', channel: 'E-mail', status: 'Aguardando cliente' },
        { id: 'ATD-1296', customer: 'Livraria Aurora', channel: 'Portal', status: 'Novo' }
      ];

      const create = (tag, className, text) => {
        const el = document.createElement(tag);
        if (className) el.className = className;
        if (text !== undefined) el.textContent = text;
        return el;
      };

      const createCard = (...children) => {
        const card = create('div', 'ia-card');
        const body = create('div', 'ia-card-body');
        children.forEach((child) => body.appendChild(child));
        card.appendChild(body);
        return card;
      };

      const createBadge = (text, tone) => create('span', `ia-badge ${tone}`, text);

      const createSidebar = () => {
        const sidebar = create('div', 'ia-sidebar');

        const logo = create('div', 'ia-logo');
        logo.append(create('div', 'ia-logo-icon'), create('div', 'ia-logo-label', 'Icarus Atend'));

        const nav = create('div', 'ia-nav');
        navItems.forEach((item, index) => {
          const navItem = create('button', `ia-nav-item ${index === 0 ? 'is-active' : ''}`, item);
          navItem.type = 'button';
          nav.appendChild(navItem);
        });

        sidebar.append(logo, nav);
        return sidebar;
      };

      const createTopbar = () => {
        const topbar = create('div', 'ia-topbar');

        const left = create('div');
        left.append(
          create('p', 'ia-topbar-title', 'Operação em tempo real'),
          create('p', 'ia-topbar-subtitle', 'Preview standalone para webhook n8n')
        );

        const right = create('div', 'ia-topbar-right');
        right.append(createBadge('API mockada', 'success'), create('span', 'ia-avatar', 'AS'));

        topbar.append(left, right);
        return topbar;
      };

      const createMetricsGrid = () => {
        const grid = create('div', 'ia-grid cols-3');

        metrics.forEach((metric) => {
          const label = create('p', 'ia-stat-label', metric.label);
          const value = create('p', 'ia-stat-value', metric.value);
          const footer = create('p', 'ia-text-muted', metric.footer);
          grid.appendChild(createCard(label, value, footer));
        });

        return grid;
      };

      const createRecentTicketsCard = () => {
        const header = create('div', 'ia-section-header');
        const left = create('div');
        left.append(
          create('p', 'ia-section-title', 'Atendimentos recentes'),
          create('p', 'ia-section-subtitle', 'Últimas interações registradas no sistema')
        );
        header.appendChild(left);

        const list = create('ul', 'ia-list');
        const toneByStatus = {
          'Em andamento': 'info',
          'Aguardando cliente': 'warning',
          Novo: 'success'
        };

        recentTickets.forEach((ticket) => {
          const item = create('li', 'ia-list-item');
          const ticketLeft = create('div');
          ticketLeft.append(
            create('p', 'ia-ticket-title', `${ticket.id} · ${ticket.customer}`),
            create('p', 'ia-ticket-subtitle', `Canal: ${ticket.channel}`)
          );

          item.append(ticketLeft, createBadge(ticket.status, toneByStatus[ticket.status] || 'info'));
          list.appendChild(item);
        });

        return createCard(header, list);
      };

      const createOverviewCard = () => {
        const header = create('div', 'ia-section-header');
        const left = create('div');
        left.append(
          create('p', 'ia-section-title', 'Visão geral operacional'),
          create('p', 'ia-section-subtitle', 'Resumo para supervisão e coordenação de atendimento')
        );
        header.appendChild(left);

        const empty = create('div', 'ia-empty');
        empty.append(
          create('p', 'ia-empty-title', 'Painéis adicionais em evolução'),
          create('p', 'ia-empty-description', 'Este preview foi otimizado para resposta HTML única em webhook.')
        );

        return createCard(header, empty);
      };

      const render = () => {
        const root = document.getElementById('ia-preview-root');
        root.innerHTML = '';

        const layout = create('div', 'ia-app-layout');
        const main = create('div', 'ia-main');
        const content = create('div', 'ia-content');

        const split = create('div', 'ia-grid cols-2');
        split.append(createRecentTicketsCard(), createOverviewCard());

        content.append(createMetricsGrid(), split);

        main.append(createTopbar(), content);
        layout.append(createSidebar(), main);
        root.appendChild(layout);
      };

      render();
    </script>
  </body>
</html>
